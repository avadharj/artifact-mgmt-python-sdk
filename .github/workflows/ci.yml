name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check lockfile is up to date
        run: |
          pip install pip-tools
          pip-compile --generate-hashes --allow-unsafe requirements.in -o /tmp/req-check.txt
          diff <(grep -v '^#' requirements.txt) <(grep -v '^#' /tmp/req-check.txt)

      - name: Lint with ruff
        run: ruff check artifact_mgmt tests

      - name: Type check with mypy
        run: mypy artifact_mgmt

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=artifact_mgmt --cov-report=term-missing --cov-fail-under=90 --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
